services:

  f5-tts:
    build: ./f5-tts
    container_name: f5-tts
    restart: unless-stopped
    runtime: nvidia
    labels:
      net.unraid.docker.icon: "http://192.168.1.33:5005/files/icons/bumblebee-f5-tts-icon.png"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0      # RTX 3060 (index 0) — shares with chatterbox (Parler moved to the 3090)
      - HF_HOME=/tts-models
    ports:
      - "5003:5003"
    volumes:
      - /mnt/user/appdata/f5-tts/models:/tts-models
      - /mnt/user/media/bumblebee:/media

  parler-tts:
    build: ./parler-tts
    container_name: parler-tts
    restart: unless-stopped
    runtime: nvidia
    labels:
      net.unraid.docker.icon: "http://192.168.1.33:5005/files/icons/bumblebee-parler-tts-icon.png"
    environment:
      - NVIDIA_VISIBLE_DEVICES=1      # RTX 3090 (index 1) — Parler is the synthesis bottleneck;
                                      # the 3090 is faster and idle during synthesis (Ollama has
                                      # finished by then), and the 3060 was VRAM-saturated (~95%).
      - HF_HOME=/tts-models
    ports:
      - "5004:5004"
    volumes:
      - /mnt/user/appdata/parler-tts/models:/tts-models
      - /mnt/user/media/bumblebee:/media

  coqui-tts:
    build: ./coqui-tts
    container_name: coqui-tts
    restart: unless-stopped
    runtime: nvidia
    labels:
      net.unraid.docker.icon: "http://192.168.1.33:5005/files/icons/bumblebee-coqui-tts-icon.png"
    environment:
      - NVIDIA_VISIBLE_DEVICES=1      # RTX 3090 (index 1) — 3060 is full
      - COQUI_TTS_HOME=/tts-models
      - COQUI_TOS_AGREED=1
    ports:
      - "5002:5002"
    volumes:
      - /mnt/user/appdata/coqui-tts/models:/tts-models
      - /mnt/user/media/bumblebee:/media

  chatterbox:
    build: ./chatterbox
    container_name: chatterbox
    restart: unless-stopped
    runtime: nvidia
    labels:
      net.unraid.docker.icon: "http://192.168.1.33:5005/files/icons/bumblebee-chatterbox-icon.png"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0      # RTX 3060 (index 0)
      - HF_HOME=/tts-models
    ports:
      - "5006:5006"
    volumes:
      - /mnt/user/appdata/chatterbox/models:/tts-models
      - /mnt/user/media/bumblebee:/media

  audio-converter:
    build: ./audio-converter
    container_name: audio-converter
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: "http://192.168.1.33:5005/files/icons/bumblebee-audio-converter-icon.png"
    ports:
      - "5007:5007"
    volumes:
      - /mnt/user/media/bumblebee:/media

  xiaozhi-gateway:
    build: ./xiaozhi-gateway
    container_name: xiaozhi-gateway
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: "http://192.168.1.33:5005/files/icons/bumblebee-xiaozhi-gateway-icon.png"
    environment:
      - WHISPER_URL=http://whisper-stt:5009
      - ORCHESTRATOR_URL=http://bumblebee-orchestrator:5005
      # n8n mode (C1+C2+C3 + Redis history per device); blank/unset = orchestrator-direct test mode.
      # Set N8N_WEBHOOK_URL in docker/.env (gitignored) to your PUBLIC HTTPS webhook, e.g.
      #   N8N_WEBHOOK_URL=https://<your-tunnel-domain>/webhook/bumblebee
      # Do NOT use n8n's LAN IP (http://192.168.1.47:5678): n8n is on macvlan br0 and this gateway is on
      # the bumblebee_default bridge; Unraid blocks macvlan<->bridge on the same host, so the LAN IP fails
      # with "All connection attempts failed". A Cloudflare Tunnel dials outbound, so the HTTPS URL works.
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      # OTA: QT (ESP32) POSTs to :5011/xiaozhi/ota/ on boot and is handed this WS url.
      # Must be the LAN-reachable host:port of the WS server below, not the docker hostname.
      - OTA_WS_URL=ws://192.168.1.33:5010/xiaozhi/v1/
      - OTA_WS_TOKEN=bumblebee-test
    ports:
      - "5010:5010"   # WebSocket (mic up / TTS down)
      - "5011:5011"   # OTA / activation discovery

  whisper-stt:
    build: ./whisper-stt
    container_name: whisper-stt
    restart: unless-stopped
    runtime: nvidia
    labels:
      net.unraid.docker.icon: "http://192.168.1.33:5005/files/icons/bumblebee-whisper-stt-icon.png"
    environment:
      - NVIDIA_VISIBLE_DEVICES=1      # RTX 3090 (index 1) — lightweight, sits alongside coqui
      - WHISPER_MODEL_DIR=/whisper-models
      - WHISPER_MODEL=base
      - WHISPER_LANGUAGE=en      # pin language; blank = auto-detect
    ports:
      - "5009:5009"
    volumes:
      - /mnt/user/appdata/whisper-stt/models:/whisper-models

  admin-console:
    build: ./admin-console
    container_name: bumblebee-admin-console
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: "http://192.168.1.33:5005/files/icons/bumblebee-admin-console-icon.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:5012]/"
    environment:
      - ORCHESTRATOR_URL=http://bumblebee-orchestrator:5005
      # n8n REST API for the workflow I/O panel. Leave blank to disable that panel.
      # Macvlan caveat: the LAN IP (192.168.1.47:5678) is NOT reachable from this
      # bridge network — set it only if this host has a route to n8n, else omit.
      - N8N_API_URL=${N8N_API_URL:-}
      - N8N_API_KEY=${N8N_API_KEY:-}
      - N8N_WORKFLOW_ID=${N8N_WORKFLOW_ID:-ykVWvfFBHQpaC2h3}
      - COMPOSE_PATH=/srv/docker-compose.yml
      - ENV_PATH=/srv/.env
      # Clip Capture tab: where accepted YouTube snippets are written (same share
      # the orchestrator reads, so a re-scan flips the voice to F5).
      - REFERENCES_DIR=/media/references
    ports:
      - "5012:5012"
    volumes:
      # compose stays read-only (validator reads it); .env is read-write so the
      # Config tab can save edits to the values it sources from .env.
      - ./docker-compose.yml:/srv/docker-compose.yml:ro
      - ./.env:/srv/.env:rw
      # read-only docker socket: lets the Config tab compare each container's
      # RUNNING env against .env/compose and flag "needs recreate" (drift check).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # media share (read-write) — the Clip Capture tab downloads YouTube snippets
      # and writes accepted clips into /media/references/<character>/. Same mount
      # the orchestrator uses, so /admin/scan-references sees the new file.
      - /mnt/user/media/bumblebee:/media:rw
    depends_on:
      - orchestrator

  orchestrator:
    build: ./orchestrator
    container_name: bumblebee-orchestrator
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: "http://192.168.1.33:5005/files/icons/bumblebee-orchestrator-icon.png"
    environment:
      - F5_TTS_URL=http://f5-tts:5003
      - PARLER_TTS_URL=http://parler-tts:5004
      - COQUI_TTS_URL=http://coqui-tts:5002
      - CHATTERBOX_URL=http://chatterbox:5006
      - AUDIO_CONVERTER_URL=http://audio-converter:5007
      - MEDIA_DIR=/media/generated
      - PUBLIC_BASE_URL=http://192.168.1.33:5005/files
      - DESCRIPTOR_PATH=/media/character_descriptor.json
      - REFERENCES_DIR=/media/references
    ports:
      - "5005:5005"
    volumes:
      - /mnt/user/media/bumblebee:/media
    depends_on:
      - f5-tts
      - parler-tts
      - coqui-tts
      - chatterbox
      - audio-converter
